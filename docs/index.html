<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C.L.U. — Cognitive Logic Unit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="hud.css">
  <link rel="stylesheet" href="theme-v5.css">
</head>
<body data-tab="today">

  <div class="report-wrap">

    <header class="site-header">
      <div class="masthead">
        <svg class="logo-svg" viewBox="0 0 120 120" aria-label="CLU identity disc">
          <path class="lg-ring" d="M52 18.8 A42 42 0 1 0 68 18.8"/>
          <path class="lg-key" d="M52 19 L52 33 M68 19 L68 33"/>
          <ellipse class="lg-eq" cx="60" cy="60" rx="42" ry="15"/>
          <circle class="lg-core" cx="60" cy="60" r="27"/>
        </svg>
        <div class="mast-div"></div>
        <div class="mast-wm">
          <div class="mast-bar"><span class="mast-dot"></span><span class="mast-rule"></span></div>
          <div class="mast-clu">C&middot;L&middot;U</div>
          <div class="mast-sub">Cognitive Logic Unit</div>
        </div>
      </div>

      <div class="statusbar" id="statusbar"></div>

      <nav class="tabs">
        <button class="tab on" data-tab="today"><span class="n">01</span> Live Report</button>
        <button class="tab" data-tab="journey"><span class="n">02</span> Projected Journey</button>
        <button class="tab" data-tab="engine"><span class="n">03</span> Ticker Engine</button>
        <button class="tab" data-tab="archive"><span class="n">04</span> Past Reports</button>
      </nav>
    </header>

    <main class="main-content">
      <div id="tab-today"   class="tab-pane active"><div id="report-root"></div></div>
      <div id="tab-journey" class="tab-pane"><div id="journey-root"></div></div>
      <div id="tab-engine"  class="tab-pane"><div id="engine-root"></div></div>
      <div id="tab-archive" class="tab-pane"><div id="archive-root"></div></div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
